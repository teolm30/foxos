<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoxOS</title>
<style>
:root {
  --accent: #00d2ff;
  --accent2: #7b2dff;
  --bg: #0d0d14;
  --surface: rgba(30,30,45,0.85);
  --surface-hover: rgba(50,50,70,0.9);
  --border: rgba(255,255,255,0.08);
  --text: #e0e0e0;
  --text-dim: #888;
  --window-bg: #16161f;
  --titlebar: #1a1a28;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: url('/foxos_wallpaper.png') center/cover no-repeat;
  height: 100vh;
  overflow: hidden;
  color: var(--text);
  user-select: none;
}

/* Top Menu Bar */
.menubar {
  height: 36px;
  background: rgba(15,15,22,0.9);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  padding: 0 12px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  border-bottom: 1px solid var(--border);
}
.menubar-left { display: flex; align-items: center; gap: 16px; flex: 1; }
.menubar-logo {
  display: flex; align-items: center; gap: 6px;
  font-weight: 700; font-size: 0.85rem; color: var(--accent);
  cursor: pointer;
}
.menubar-logo svg { width: 18px; height: 18px; }
.menubar-menu { display: flex; gap: 4px; }
.menubar-menu button {
  background: none; border: none; color: var(--text);
  padding: 4px 10px; border-radius: 4px; font-size: 0.8rem;
  cursor: pointer;
}
.menubar-menu button:hover { background: var(--surface-hover); }
.menubar-right {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8rem; color: var(--text-dim);
}
.menubar-right .icon-btn {
  background: none; border: none; color: var(--text);
  padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;
}
.menubar-right .icon-btn:hover { background: var(--surface-hover); }
.clock {
  font-size: 0.8rem; font-weight: 500; color: var(--text);
  padding: 3px 10px; background: var(--surface); border-radius: 4px;
}

/* Desktop Icons */
.desktop {
  position: fixed;
  top: 36px; left: 0; right: 0; bottom: 70px;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, 80px);
  grid-template-rows: repeat(auto-fill, 90px);
  gap: 8px;
  align-content: start;
}
.desktop-icon {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 8px; border-radius: 8px; cursor: pointer;
}
.desktop-icon:hover { background: rgba(255,255,255,0.08); }
.desktop-icon svg, .desktop-icon .icon-img {
  width: 48px; height: 48px;
}
.desktop-icon span {
  font-size: 0.7rem; text-align: center; color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  line-height: 1.2;
}

/* Dock */
.dock {
  position: fixed;
  bottom: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(20,20,30,0.85);
  backdrop-filter: blur(20px);
  border-radius: 18px;
  padding: 6px 10px;
  display: flex; align-items: center; gap: 4px;
  border: 1px solid var(--border);
  z-index: 1000;
}
.dock-item {
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px; cursor: pointer;
  position: relative; transition: transform 0.15s;
}
.dock-item:hover { transform: translateY(-6px) scale(1.1); }
.dock-item svg, .dock-item .icon-img { width: 36px; height: 36px; }
.dock-item.running::after {
  content: ''; position: absolute; bottom: 2px; left: 50%;
  transform: translateX(-50%); width: 5px; height: 5px;
  background: var(--accent); border-radius: 50%;
}
.dock-sep { width: 1px; height: 40px; background: var(--border); margin: 0 4px; }

/* Windows */
.window {
  position: fixed;
  background: var(--window-bg);
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
  display: flex; flex-direction: column;
  z-index: 100;
  overflow: hidden;
  min-width: 400px; min-height: 300px;
}
.window.active { z-index: 200; }
.window-titlebar {
  height: 38px; background: var(--titlebar);
  display: flex; align-items: center; padding: 0 12px; gap: 8px;
  cursor: move; flex-shrink: 0;
}
.window-controls {
  display: flex; gap: 6px;
}
.window-btn {
  width: 13px; height: 13px; border-radius: 50%; border: none; cursor: pointer;
}
.window-btn.close { background: #ff5f57; }
.window-btn.minimize { background: #ffbd2e; }
.window-btn.maximize { background: #28ca41; }
.window-btn:hover { filter: brightness(0.85); }
.window-title {
  flex: 1; text-align: center; font-size: 0.8rem; font-weight: 500;
  color: var(--text-dim); white-space: nowrap; overflow: hidden;
}
.window-appname {
  font-size: 0.8rem; font-weight: 600; color: var(--text); margin-left: 8px;
}
.window-body { flex: 1; overflow: auto; }

/* Settings App */
.settings-sidebar {
  width: 200px;
  background: rgba(20,20,32,0.95);
  border-right: 1px solid var(--border);
  padding: 10px 0;
  flex-shrink: 0;
}
.settings-nav { display: flex; flex-direction: column; gap: 2px; }
.settings-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; font-size: 0.82rem; color: var(--text-dim);
  cursor: pointer; border: none; background: none; width: 100%;
  text-align: left; border-radius: 0;
}
.settings-nav-item:hover { background: var(--surface-hover); color: var(--text); }
.settings-nav-item.active { background: rgba(0,210,255,0.12); color: var(--accent); }
.settings-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.settings-content { flex: 1; padding: 24px; overflow-y: auto; }
.settings-section { margin-bottom: 28px; }
.settings-section h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
.settings-section h3 { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 10px; }
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-row label { font-size: 0.85rem; color: var(--text); }
.settings-row .desc { font-size: 0.75rem; color: var(--text-dim); }
.toggle {
  width: 40px; height: 22px; background: #333; border-radius: 11px;
  position: relative; cursor: pointer; transition: background 0.2s;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 16px; height: 16px; background: #fff; border-radius: 50%;
  transition: left 0.2s;
}
.toggle.on::after { left: 21px; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; border: none; padding: 10px 20px; border-radius: 8px;
  font-size: 0.85rem; cursor: pointer; font-weight: 500;
}
.btn-primary:hover { opacity: 0.9; }
.btn-secondary {
  background: var(--surface); color: var(--text); border: 1px solid var(--border);
  padding: 8px 16px; border-radius: 8px; font-size: 0.82rem; cursor: pointer;
}
.btn-secondary:hover { background: var(--surface-hover); }

/* Update Tab */
.update-card {
  background: rgba(0,210,255,0.06); border: 1px solid rgba(0,210,255,0.2);
  border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px;
}
.update-card.up2date { background: rgba(40,202,65,0.06); border-color: rgba(40,202,65,0.2); }
.update-icon { font-size: 3rem; margin-bottom: 10px; }
.update-card h3 { margin-bottom: 6px; font-size: 1rem; }
.update-card p { color: var(--text-dim); font-size: 0.82rem; }
.version-tag {
  display: inline-block; background: var(--surface); border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; color: var(--accent);
  margin: 8px 0;
}
.update-progress { margin-top: 16px; display: none; }
.update-progress-bar {
  height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin: 8px 0;
}
.update-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0%; transition: width 0.3s;
}
.update-log {
  background: #0a0a12; border: 1px solid var(--border); border-radius: 8px;
  padding: 12px; font-family: 'Courier New', monospace; font-size: 0.75rem;
  color: #aaa; max-height: 150px; overflow-y: auto; margin-top: 12px;
}
.update-log div { padding: 2px 0; }

/* Terminal */
.terminal {
  background: #0a0a12; color: #00ff9d; font-family: 'Courier New', monospace;
  font-size: 0.82rem; padding: 12px; height: 100%; overflow-y: auto;
}
.terminal .line { margin-bottom: 2px; }
.terminal .prompt { color: var(--accent); }
.terminal-input {
  background: none; border: none; color: #00ff9d; font-family: inherit;
  font-size: inherit; outline: none; width: calc(100% - 20px); caret-color: #00ff9d;
}
.terminal-input::selection { background: rgba(0,255,157,0.3); }

/* Calculator */
.calc-app { display: flex; flex-direction: column; height: 100%; }
.calc-display {
  background: var(--titlebar); padding: 16px 20px; text-align: right;
  font-size: 2rem; font-weight: 300; color: var(--text);
  border-bottom: 1px solid var(--border); min-height: 70px; word-break: break-all;
}
.calc-display small { font-size: 0.7rem; color: var(--text-dim); display: block; text-align: right; margin-bottom: 4px; }
.calc-buttons { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
.calc-btn {
  background: var(--window-bg); border: none; color: var(--text);
  font-size: 1.1rem; cursor: pointer; padding: 14px; transition: background 0.1s;
}
.calc-btn:hover { background: var(--surface-hover); }
.calc-btn.op { color: var(--accent); }
.calc-btn.eq { background: var(--accent); color: #fff; }
.calc-btn.eq:hover { filter: brightness(1.1); }

/* File Manager */
.file-toolbar {
  background: var(--titlebar); padding: 8px 12px; display: flex; gap: 8px;
  align-items: center; border-bottom: 1px solid var(--border);
}
.file-toolbar button {
  background: none; border: 1px solid var(--border); color: var(--text);
  padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; cursor: pointer;
}
.file-toolbar button:hover { background: var(--surface-hover); }
.file-path {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; color: var(--text-dim);
}
.file-grid {
  display: grid; grid-template-columns: repeat(auto-fill, 100px);
  gap: 4px; padding: 12px; flex: 1; overflow-y: auto; align-content: start;
}
.file-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 6px; border-radius: 8px; cursor: pointer;
}
.file-item:hover { background: var(--surface-hover); }
.file-item svg { width: 40px; height: 40px; }
.file-item span { font-size: 0.7rem; text-align: center; color: var(--text-dim); word-break: break-all; }

/* Text Editor */
.editor-toolbar {
  background: var(--titlebar); padding: 8px 12px; display: flex; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.editor-toolbar button {
  background: none; border: 1px solid var(--border); color: var(--text);
  padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; cursor: pointer;
}
.editor-toolbar button:hover { background: var(--surface-hover); }
.editor-body { flex: 1; }
.editor-body textarea {
  width: 100%; height: 100%; background: var(--window-bg); border: none;
  color: var(--text); font-family: 'Courier New', monospace; font-size: 0.85rem;
  padding: 16px; resize: none; outline: none; line-height: 1.5;
}

/* Notifications */
.notifications {
  position: fixed; top: 44px; right: 12px; width: 300px;
  display: flex; flex-direction: column; gap: 8px; z-index: 3000;
}
.notif {
  background: rgba(25,25,40,0.95); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px;
  animation: notifIn 0.3s ease;
}
.notif-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 3px; }
.notif-body { font-size: 0.75rem; color: var(--text-dim); }
.notif.close { animation: notifOut 0.3s ease forwards; }
@keyframes notifIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
@keyframes notifOut { to { opacity: 0; transform: translateX(20px); } }

/* Lock Screen */
.lockscreen {
  position: fixed; inset: 0; background: rgba(10,10,18,0.97);
  backdrop-filter: blur(30px); z-index: 5000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px;
}
.lockscreen.bye { animation: fadeOut 0.5s ease forwards; }
@keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
.lock-logo { margin-bottom: 10px; }
.lock-logo svg { width: 80px; height: 80px; filter: drop-shadow(0 0 20px rgba(0,210,255,0.4)); }
.lock-user { font-size: 1.2rem; font-weight: 600; }
.lock-pass { display: flex; gap: 8px; }
.lock-dot {
  width: 14px; height: 14px; background: var(--accent); border-radius: 50%;
  border: 2px solid rgba(0,210,255,0.3);
}
.lock-hint { font-size: 0.78rem; color: var(--text-dim); }

/* Slider */
input[type="range"] {
  -webkit-appearance: none; width: 140px; height: 4px;
  background: #333; border-radius: 2px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  background: var(--accent); border-radius: 50%; cursor: pointer;
}

/* Volume / Brightness overlays */
.overlay-msg {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(20,20,35,0.95); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 16px; padding: 30px 50px;
  text-align: center; z-index: 4000; font-size: 1.2rem; font-weight: 500;
  animation: fadeIn 0.2s ease;
}
.overlay-msg svg { width: 40px; height: 40px; margin-bottom: 10px; display: block; margin-inline: auto; }
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%,-50%) scale(0.9); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>

const APP_DIR = '/foxos_apps/';
const APP_MANIFEST = {

  files: { title: 'Files', width: 700, height: 480, icon: '📁' },
  terminal: { title: 'Terminal', width: 640, height: 420, icon: '⌨️' },

};

// === Window System ===
function openApp(id, tab) {
  if (windows[id] && !tab) {
    focusWindow(id);
    return;
  }
  const app = APP_MANIFEST[id];
  if (!app) return;

  const win = document.createElement('div');
  win.className = 'window';
  win.id = 'win-' + id;
  win.style.width = app.width + 'px';
  win.style.height = app.height + 'px';
  win.style.left = Math.round(100 + Object.keys(windows).length * 30) + 'px';
  win.style.top = Math.round(60 + Object.keys(windows).length * 30) + 'px';

  win.innerHTML = `
    <div class="window-titlebar">
      <div class="window-controls">
        <button class="window-btn close" onclick="event.stopPropagation(); closeWin('${id}')"></button>
        <button class="window-btn minimize" onclick="event.stopPropagation(); minimizeWin('${id}')"></button>
        <button class="window-btn maximize" onclick="event.stopPropagation(); toggleMaximize('${id}')"></button>
      </div>
      <span class="window-appname">${app.icon} ${app.title}</span>
    </div>
    <div class="window-body" id="winbody-${id}"></div>
  `;

  win.addEventListener('mousedown', () => focusWindow(id));
  dragElement(win);
  document.getElementById('windows').appendChild(win);
  windows[id] = { el: win, minimized: false };
  focusWindow(id);

  // Render app content
  const body = document.getElementById('winbody-' + id);
  renderApp(id, body, tab);

  // Mark dock item running
  document.querySelectorAll('.dock-item').forEach(d => {
    if (d.getAttribute('title') === app.title) d.classList.add('running');
  });
}

function closeWin(id) {
  if (windows[id]) {
    windows[id].el.remove();
    delete windows[id];
    const app = APP_MANIFEST[id];
    if (app) {
      const dockItems = document.querySelectorAll('.dock-item');
      dockItems.forEach(d => {
        if (d.getAttribute('title') === app.title) d.classList.remove('running');
      });
    }
  }
}

function minimizeWin(id) {
  if (windows[id]) {
    windows[id].el.style.display = 'none';
    windows[id].minimized = true;
  }
}

function toggleMaximize(id) {
  if (!windows[id]) return;
  const win = windows[id].el;
  if (win.dataset.maximized === '1') {
    win.style.left = win.dataset.prevLeft;
    win.style.top = win.dataset.prevTop;
    win.style.width = win.dataset.prevW;
    win.style.height = win.dataset.prevH;
    win.dataset.maximized = '0';
  } else {
    win.dataset.prevLeft = win.style.left;
    win.dataset.prevTop = win.style.top;
    win.dataset.prevW = win.style.width;
    win.dataset.prevH = win.style.height;
    win.style.left = '0';
    win.style.top = '0';
    win.style.width = '100%';
    win.style.height = '100%';
    win.dataset.maximized = '1';
  }
}

function focusWindow(id) {
  if (!windows[id]) return;
  document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
  windows[id].el.classList.add('active');
  windows[id].el.style.zIndex = ++zIndex;
  activeWin = id;
}

function dragElement(el) {
  let pos = { x: 0, y: 0 };
  el.addEventListener('mousedown', dragStart, false);
  function dragStart(e) {
    if (e.target.closest('.window-controls')) return;
    e.preventDefault();
    pos.x = e.clientX;
    pos.y = e.clientY;
    document.addEventListener('mousemove', dragMove, false);
    document.addEventListener('mouseup', dragEnd, false);
  }
  function dragMove(e) {
    const dx = e.clientX - pos.x;
    const dy = e.clientY - pos.y;
    pos.x = e.clientX;
    pos.y = e.clientY;
    el.style.left = (el.offsetLeft + dx) + 'px';
    el.style.top = (el.offsetTop + dy) + 'px';
  }
  function dragEnd() {
    document.removeEventListener('mousemove', dragMove);
    document.removeEventListener('mouseup', dragEnd);
  }
}

let updateSteps = [];
let updateStep = 0;

function checkForUpdates() {
  const btn = document.getElementById('checkBtn');
  const progress = document.getElementById('updateProgress');
  const log = document.getElementById('updateLog');
  const card = document.getElementById('updateCard');
  const fill = document.getElementById('progressFill');
  const ptext = document.getElementById('progressText');

  btn.disabled = true;
  btn.textContent = 'Checking...';
  progress.style.display = 'block';
  log.innerHTML = '';

  updateSteps = [
    'Connecting to update server...',
    'Checking FoxOS repository...',
    'Comparing versions...',
    'You are running the latest version.',
  ];
  updateStep = 0;

  function nextStep() {
    if (updateStep < updateSteps.length) {
      const div = document.createElement('div');
      div.textContent = '> ' + updateSteps[updateStep];
      div.style.color = updateStep < 3 ? 'var(--accent)' : '#28ca41';
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      fill.style.width = ((updateStep + 1) / updateSteps.length * 100) + '%';
      ptext.textContent = updateStep < 3 ? `Step ${updateStep + 1} of ${updateSteps.length - 1}...` : 'Up to date!';
      updateStep++;
      setTimeout(nextStep, 700);
    } else {
      btn.disabled = false;
      btn.textContent = 'Check for Updates';
      setTimeout(() => {
        progress.style.display = 'none';
        fill.style.width = '0%';
      }, 2000);
    }
  }
  nextStep();
}

  const inputLine = document.createElement('div');
  inputLine.className = 'line';
  inputLine.innerHTML = `<span class="prompt">teo@foxos:~$</span> <input class="terminal-input" id="termInput" autofocus>`;
  termBody.appendChild(inputLine);
  const inp = document.getElementById('termInput');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const cmd = inp.value.trim();
      inp.replaceWith(document.createTextNode(cmd));
      const out = document.createElement('div');
      out.className = 'line';
      out.style.color = '#fff';
      out.textContent = runCmd(cmd);
      termBody.insertBefore(out, inputLine);
      termBody.scrollTop = termBody.scrollHeight;
      const newInput = document.createElement('input');
      newInput.className = 'terminal-input';
      newInput.id = 'termInput';
      inputLine.replaceWith(newInput);
      document.getElementById('termInput').focus();
    }
  });
  termBody.onclick = () => document.getElementById('termInput')?.focus();
}

function runCmd(cmd) {
  const c = cmd.toLowerCase().split(' ')[0];
  if (c === 'ls') return 'Desktop  Documents  Downloads  Pictures  Music  Videos';
  if (c === 'pwd') return '/home/teo';
  if (c === 'whoami') return 'teo';
  if (c === 'date') return new Date().toString();
  if (c === 'uname') return 'FoxOS 1.0 GNU/Linux';
  if (c === 'cat') return 'foxos.txt: Permission denied';
  if (c === 'sudo') return 'teo is not in the sudoers file. This incident will be reported.';
  if (c === 'neofetch') return `\n  ████████╗  ████████╗  \n  ╚════██╔╝  ██╔═════╝  \n      ██╔╝   ███████╗  \n     ██╔╝    ╚══════╝  \n    ██╔╝     ███████╗  \n    ██║      ╚══════╝  \n\n  ${VERSION}\n  Kernel: 6.17.0-20-generic\n  Shell: bash 5.2\n  Resolution: 1920x2160\n  Theme: Arc-Dark\n  CPU: Intel i5-12400\n  Memory: 32GB RAM`;
  if (c === 'help') return 'Available: ls, pwd, whoami, date, uname, neofetch, clear, help';
  if (c === 'clear') { document.getElementById('termBody').innerHTML = ''; return ''; }
  return `foxos: command not found: ${c}. Type 'help' for available commands.`;
}

function renderCalc(body) {
  body.style.display = 'flex';
  body.style.flexDirection = 'column';
  body.style.height = '100%';
  body.innerHTML = `
    <div class="calc-app">
      <div class="calc-display" id="calcDisp"><small id="calcSmall"></small><span id="calcVal">0</span></div>
      <div class="calc-buttons">
        <button class="calc-btn op" onclick="calc('C')">C</button>
        <button class="calc-btn op" onclick="calc('±')">±</button>
        <button class="calc-btn op" onclick="calc('%')">%</button>
        <button class="calc-btn op" onclick="calc('/')">÷</button>
        <button class="calc-btn" onclick="calc('7')">7</button>
        <button class="calc-btn" onclick="calc('8')">8</button>
        <button class="calc-btn" onclick="calc('9')">9</button>
        <button class="calc-btn op" onclick="calc('*')">×</button>
        <button class="calc-btn" onclick="calc('4')">4</button>
        <button class="calc-btn" onclick="calc('5')">5</button>
        <button class="calc-btn" onclick="calc('6')">6</button>
        <button class="calc-btn op" onclick="calc('-')">−</button>
        <button class="calc-btn" onclick="calc('1')">1</button>
        <button class="calc-btn" onclick="calc('2')">2</button>
        <button class="calc-btn" onclick="calc('3')">3</button>
        <button class="calc-btn op" onclick="calc('+')">+</button>
        <button class="calc-btn" onclick="calc('0')" style="grid-column:span 2">0</button>
        <button class="calc-btn" onclick="calc('.')">.</button>
        <button class="calc-btn eq" onclick="calc('=')">=</button>
      </div>
    </div>`;
}

let calcVal = '0', calcPrev = '', calcOp = null, calcNew = true;
function calc(v) {
  const disp = document.getElementById('calcVal');
  const small = document.getElementById('calcSmall');
  if (v === 'C') { calcVal = '0'; calcPrev = ''; calcOp = null; disp.textContent = '0'; small.textContent = ''; return; }
  if (v === '±') { calcVal = String(-parseFloat(calcVal)); disp.textContent = calcVal; return; }
  if (v === '%') { calcVal = String(parseFloat(calcVal)/100); disp.textContent = calcVal; return; }
  if ('+-*/'.includes(v) && calcPrev && calcVal !== '0') {
    calcVal = String(eval(calcPrev + calcOp + calcVal));
    calcPrev = calcVal; calcOp = v;
    small.textContent = calcPrev + ' ' + v;
    calcVal = '0'; disp.textContent = '0';
    return;
  }
  if (v === '=' && calcPrev) {
    const result = String(eval(calcPrev + calcOp + calcVal));
    small.textContent = calcPrev + ' ' + calcOp + ' ' + calcVal + ' =';
    disp.textContent = result; calcVal = result; calcPrev = ''; calcOp = null; return;
  }
  if ('+-*/'.includes(v)) { calcPrev = calcVal; calcOp = v; small.textContent = calcVal + ' ' + v; calcNew = true; return; }
  if (calcNew || calcVal === '0') { calcVal = v; calcNew = false; }
  else calcVal += v;
  disp.textContent = calcVal;
}

// === Notifications ===
function showNotif(title, body, duration = 4000) {
  const container = document.getElementById('notifs');
  const notif = document.createElement('div');
  notif.className = 'notif';
  notif.innerHTML = `<div class="notif-title">${title}</div><div class="notif-body">${body}</div>`;
  container.appendChild(notif);
  setTimeout(() => { notif.classList.add('close'); setTimeout(() => notif.remove(), 300); }, duration);
}

// === Clock ===
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
}
setInterval(updateClock, 1000);
updateClock();
