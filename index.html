<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoxOS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --fox-blue: #2997ff;
  --fox-accent: #0a84ff;
  --bar-bg: rgba(30,30,30,0.82);
  --dock-bg: rgba(50,50,50,0.75);
  --win-bg: rgba(36,36,36,0.97);
  --win-title: rgba(50,50,50,0.98);
  --text: #e8e8ed;
  --text-dim: #8e8e93;
  --border: rgba(255,255,255,0.08);
  --hover: rgba(255,255,255,0.06);
  --dock-item: rgba(255,255,255,0.85);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  background: url('foxos_wallpaper.jpg') center/cover no-repeat;
  user-select: none;
  -webkit-user-select: none;
  cursor: default;
}

/* ===== MENU BAR ===== */
.menubar {
  position: fixed; top: 0; left: 0; right: 0; height: 28px;
  background: var(--bar-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex; align-items: center;
  padding: 0 12px;
  z-index: 9999;
  border-bottom: 1px solid var(--border);
}

.menubar-left { display:flex; align-items:center; gap:14px; flex:1; }
.menubar-right { display:flex; align-items:center; gap:10px; }

.fox-logo {
  font-size: 15px; color: var(--text); font-weight: 600;
  letter-spacing: -0.3px;
}
.fox-logo svg { width:14px; height:14px; vertical-align:middle; margin-right:4px; }

.menu-item {
  font-size: 12.5px; color: var(--text); font-weight: 400;
  padding: 2px 8px; border-radius: 4px; cursor: default;
  transition: background 0.15s;
}
.menu-item:hover { background: rgba(255,255,255,0.12); }

.menubar-icons { display:flex; gap:8px; align-items:center; }
.menubar-icon {
  font-size: 13px; color: var(--text); cursor: default;
  padding: 2px 4px;
}
.menubar-time {
  font-size: 12.5px; color: var(--text); font-weight: 500;
  padding: 2px 8px;
}

/* ===== DESKTOP ===== */
.desktop {
  position: fixed; top:28px; left:0; right:0; bottom:72px;
  padding: 16px 20px;
}

.desktop-icon {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; cursor: pointer; padding: 8px; border-radius: 8px;
  transition: background 0.15s;
  margin-bottom: 12px;
  width: 80px;
}
.desktop-icon:hover { background: rgba(255,255,255,0.08); }
.desktop-icon:active .icon-img { transform: scale(0.95); }

.icon-img {
  width: 64px; height: 64px;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  transition: transform 0.15s;
}
.icon-label {
  font-size: 11.5px; color: #fff; font-weight: 500;
  text-align: center; max-width: 72px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  line-height: 1.3;
}

/* ===== DOCK ===== */
.dock-wrap {
  position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%);
  z-index: 9999;
}
.dock {
  display: flex; align-items: flex-end; gap: 4px;
  background: var(--dock-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 16px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
}

.dock-sep { width: 1px; height: 44px; background: rgba(255,255,255,0.15); margin: 0 4px; align-self: center; }

.dock-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; cursor: pointer; padding: 2px;
  position: relative;
  border-radius: 10px;
  transition: transform 0.15s;
}
.dock-item:hover {
  transform: translateY(-8px) scale(1.15);
}
.dock-item:active { transform: translateY(-4px) scale(1.05); }

.dock-icon {
  width: 48px; height: 48px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  overflow: hidden;
}
.dock-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; }

.dock-label {
  font-size: 10px; color: #fff; font-weight: 500;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

.dock-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(255,255,255,0.6);
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
}

/* ===== WINDOWS ===== */
.window {
  position: absolute;
  background: var(--win-bg);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border-radius: 10px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  overflow: hidden;
  min-width: 400px; min-height: 260px;
}

.window.maximized {
  top: 0 !important; left: 0 !important;
  width: 100vw !important; height: calc(100vh - 28px - 72px) !important;
  border-radius: 0;
}

.win-titlebar {
  height: 36px; background: var(--win-title);
  display: flex; align-items: center;
  padding: 0 12px; gap: 8px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  cursor: default;
}

.win-controls {
  display: flex; gap: 7px; align-items: center;
}
.win-btn {
  width: 13px; height: 13px; border-radius: 50%;
  cursor: pointer; transition: filter 0.15s;
}
.win-btn:hover { filter: brightness(0.85); }
.win-btn.close { background: #ff5f57; }
.win-btn.minimize { background: #ffbd2e; }
.win-btn.maximize { background: #28c840; }

.win-title {
  font-size: 12.5px; color: var(--text); font-weight: 500;
  flex: 1; text-align: center; padding-right: 60px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.win-toolbar {
  height: 34px; background: rgba(44,44,44,0.6);
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.win-toolbar-btn {
  font-size: 13px; color: var(--text-dim); cursor: pointer;
  padding: 3px 8px; border-radius: 4px; transition: all 0.15s;
}
.win-toolbar-btn:hover { background: var(--hover); color: var(--text); }

.win-content {
  flex: 1; overflow: auto; padding: 0;
  display: flex; flex-direction: column;
}

/* ===== SETTINGS APP ===== */
.settings-nav {
  width: 180px; background: rgba(30,30,30,0.5);
  border-right: 1px solid var(--border);
  padding: 8px 0; flex-shrink: 0;
}
.settings-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px; font-size: 13px; color: var(--text);
  cursor: pointer; transition: background 0.15s; border-radius: 0;
}
.settings-nav-item:hover { background: var(--hover); }
.settings-nav-item.active { background: rgba(41,151,255,0.18); color: var(--fox-blue); }
.settings-nav-item svg { font-size: 16px; width: 18px; text-align: center; }

.settings-main {
  flex: 1; padding: 20px 24px; overflow-y: auto;
}

.settings-header {
  font-size: 22px; font-weight: 700; color: var(--text);
  margin-bottom: 4px;
}
.settings-subheader {
  font-size: 12px; color: var(--text-dim); margin-bottom: 24px;
}

.settings-section {
  margin-bottom: 24px;
}
.settings-section-title {
  font-size: 11px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 12px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 13px; color: var(--text); }
.settings-value { font-size: 12px; color: var(--text-dim); }

.version-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(41,151,255,0.15); color: var(--fox-blue);
  font-size: 12px; font-weight: 600; padding: 4px 12px;
  border-radius: 20px; border: 1px solid rgba(41,151,255,0.3);
}

.update-btn {
  background: var(--fox-accent); color: #fff;
  font-size: 12px; font-weight: 600; padding: 6px 16px;
  border-radius: 6px; cursor: pointer; border: none;
  transition: opacity 0.15s;
}
.update-btn:hover { opacity: 0.85; }
.update-btn:disabled { opacity: 0.5; cursor: default; }

.update-progress {
  height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;
  margin-top: 10px; overflow: hidden; display: none;
}
.update-progress-bar {
  height: 100%; background: var(--fox-blue); border-radius: 2px;
  width: 0%; transition: width 0.3s;
}

/* ===== FILES APP ===== */
.files-sidebar {
  width: 160px; background: rgba(28,28,28,0.5);
  border-right: 1px solid var(--border);
  padding: 8px 0; flex-shrink: 0;
}
.files-sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; font-size: 12.5px; color: var(--text);
  cursor: pointer; transition: background 0.15s;
}
.files-sidebar-item:hover { background: var(--hover); }
.files-sidebar-item.active { background: rgba(41,151,255,0.15); color: var(--fox-blue); }

.files-content { flex: 1; padding: 12px 16px; overflow-y: auto; }
.files-path-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; background: rgba(50,50,50,0.5);
  border-radius: 6px; margin-bottom: 12px; font-size: 12px; color: var(--text-dim);
}
.files-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(90px,1fr)); gap: 8px; }
.file-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 5px; padding: 10px 6px; border-radius: 8px; cursor: pointer;
  transition: background 0.15s;
}
.file-item:hover { background: rgba(255,255,255,0.06); }
.file-icon { font-size: 38px; }
.file-name { font-size: 11px; color: var(--text); text-align: center; word-break: break-all; line-height: 1.3; }

/* ===== TERMINAL APP ===== */
.terminal-body {
  background: rgba(12,12,12,0.95); flex: 1; padding: 12px;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  font-size: 13px; color: #00ff9d; overflow-y: auto;
  display: flex; flex-direction: column; gap: 2px;
}
.terminal-line { display: flex; gap: 8px; line-height: 1.5; }
.terminal-prompt { color: #00a8ff; white-space: nowrap; }
.terminal-cmd { color: #e8e8ed; }
.terminal-out { color: rgba(255,255,255,0.7); white-space: pre-wrap; }
.terminal-input {
  background: transparent; border: none; outline: none;
  color: #e8e8ed; font-family: inherit; font-size: inherit;
  flex: 1; min-width: 100px;
}
.terminal-input::placeholder { color: rgba(255,255,255,0.2); }

/* ===== CALCULATOR ===== */
.calc-display {
  background: rgba(20,20,20,0.9); padding: 14px 16px; text-align: right;
  font-size: 36px; font-weight: 300; color: #fff;
  font-family: 'Inter', sans-serif; letter-spacing: -1px;
  min-height: 60px; word-break: break-all;
}
.calc-display-sub { font-size: 14px; color: var(--text-dim); font-weight: 400; margin-top: 2px; }
.calc-buttons {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 1px;
  background: rgba(0,0,0,0.3); flex: 1;
}
.calc-btn {
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff; cursor: pointer;
  background: rgba(60,60,60,0.4); transition: background 0.1s;
  border: none; padding: 0;
}
.calc-btn:hover { background: rgba(80,80,80,0.5); }
.calc-btn:active { background: rgba(100,100,100,0.6); }
.calc-btn.op { background: rgba(41,151,255,0.25); color: var(--fox-blue); }
.calc-btn.op:hover { background: rgba(41,151,255,0.4); }
.calc-btn.equals { background: var(--fox-accent); color: #fff; }
.calc-btn.equals:hover { background: #2980ff; }
.calc-btn.fn { background: rgba(80,80,80,0.35); color: var(--text); font-size: 16px; }
.calc-btn.fn:hover { background: rgba(100,100,100,0.5); }

/* ===== APP STORE ===== */
.appstore-bar {
  height: 50px; background: rgba(30,30,30,0.7);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.appstore-search {
  flex: 1; background: rgba(60,60,60,0.5); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 12px; color: var(--text);
  font-size: 13px; outline: none; font-family: inherit;
}
.appstore-search::placeholder { color: var(--text-dim); }
.app-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(130px,1fr)); gap: 16px; padding: 16px; }
.app-card {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; cursor: pointer; padding: 12px 8px; border-radius: 12px;
  transition: background 0.15s;
}
.app-card:hover { background: rgba(255,255,255,0.06); }
.app-icon-large { width: 72px; height: 72px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 42px; overflow: hidden; }
.app-icon-large img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }
.app-name { font-size: 12px; color: var(--text); font-weight: 500; text-align: center; }
.app-dev { font-size: 11px; color: var(--text-dim); }
.app-get-btn {
  background: rgba(41,151,255,0.15); color: var(--fox-blue);
  font-size: 11px; font-weight: 600; padding: 3px 12px; border-radius: 12px;
  border: 1px solid rgba(41,151,255,0.3);
}

/* ===== TEXT EDITOR ===== */
.editor-bar {
  height: 36px; background: rgba(44,44,44,0.6);
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.editor-bar-btn {
  font-size: 12px; color: var(--text-dim); cursor: pointer;
  padding: 3px 10px; border-radius: 4px; transition: all 0.15s;
}
.editor-bar-btn:hover { background: var(--hover); color: var(--text); }
.editor-textarea {
  flex: 1; background: rgba(20,20,20,0.8); color: #e8e8ed;
  border: none; outline: none; resize: none;
  padding: 16px; font-family: 'SF Mono', 'Cascadia Code', monospace;
  font-size: 13px; line-height: 1.6;
}

/* ===== WELCOME APP ===== */
.welcome-content {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px;
  padding: 40px;
}
.welcome-logo { font-size: 80px; }
.welcome-title { font-size: 28px; font-weight: 700; color: var(--text); }
.welcome-subtitle { font-size: 16px; color: var(--text-dim); text-align: center; }
.welcome-btns { display: flex; gap: 12px; margin-top: 8px; }
.welcome-btn {
  padding: 10px 24px; border-radius: 8px; font-size: 14px;
  font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s;
}
.welcome-btn:hover { opacity: 0.85; }
.welcome-btn.primary { background: var(--fox-accent); color: #fff; }
.welcome-btn.secondary { background: rgba(255,255,255,0.1); color: var(--text); }

/* ===== SYSTEM MONITOR ===== */
.sysmon-header {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 12px; background: rgba(20,20,20,0.4); border-bottom: 1px solid var(--border);
}
.sysmon-stat {
  background: rgba(50,50,50,0.5); border-radius: 8px; padding: 12px; text-align: center;
}
.sysmon-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.sysmon-stat-value { font-size: 20px; font-weight: 600; color: var(--text); }
.sysmon-stat-sub { font-size: 11px; color: var(--text-dim); }
.sysmon-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.sysmon-bar-fill { height: 100%; border-radius: 2px; transition: width 1s; }
.cpu-bar { background: #ff5f57; }
.mem-bar { background: #ffbd2e; }
.disk-bar { background: #28c840; }

.sysmon-procs { flex: 1; overflow-y: auto; }
.proc-row {
  display: grid; grid-template-columns: 50px 1fr 80px 80px; gap: 8px;
  padding: 6px 12px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
  align-items: center;
}
.proc-row:hover { background: rgba(255,255,255,0.03); }
.proc-pid { color: var(--text-dim); }
.proc-name { color: var(--text); }
.proc-cpu, .proc-mem { color: var(--text-dim); text-align: right; }

/* ===== MISC ===== */
.loading-spinner {
  width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--fox-blue); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 20px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.notif-badge {
  position: fixed; top: 36px; right: 16px;
  background: rgba(40,40,40,0.95); border-radius: 12px;
  padding: 12px 16px; display: none; flex-direction:column; gap: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 99999;
  border: 1px solid var(--border); min-width: 280px;
  animation: slideIn 0.3s ease;
}
.notif-badge.show { display: flex; }
.notif-title { font-size: 13px; font-weight: 600; color: var(--text); }
.notif-body { font-size: 12px; color: var(--text-dim); }
@keyframes slideIn {
  from { transform: translateY(-10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

iframe.embedded-site {
  width: 100%; height: 100%; border: none; background: #fff;
}
</style>
</head>
<body>

<!-- NOTIFICATION -->
<div class="notif-badge" id="notif">
  <div class="notif-title" id="notifTitle">FoxOS Update</div>
  <div class="notif-body" id="notifBody">A new version is available!</div>
</div>

<!-- MENU BAR -->
<div class="menubar">
  <div class="menubar-left">
    <span class="fox-logo">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="#2997ff">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h2v-6h-2v6zm0-8h2V7h-2v2z"/>
      </svg>
      FoxOS
    </span>
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">View</span>
    <span class="menu-item">Go</span>
    <span class="menu-item">Window</span>
    <span class="menu-item">Help</span>
  </div>
  <div class="menubar-right">
    <div class="menubar-icons">
      <span class="menubar-icon">🔋</span>
      <span class="menubar-icon">📶</span>
      <span class="menubar-icon" id="clock"></span>
    </div>
  </div>
</div>

<!-- DESKTOP -->
<div class="desktop" id="desktop">

  <!-- My Computer -->
  <div class="desktop-icon" ondblclick="openApp('settings')" title="System Settings">
    <div class="icon-img">💻</div>
    <div class="icon-label">My Computer</div>
  </div>

  <!-- Files -->
  <div class="desktop-icon" ondblclick="openApp('files')" title="File Manager">
    <div class="icon-img">📁</div>
    <div class="icon-label">Files</div>
  </div>

  <!-- Terminal -->
  <div class="desktop-icon" ondblclick="openApp('terminal')" title="Terminal">
    <div class="icon-img">⬛</div>
    <div class="icon-label">Terminal</div>
  </div>

  <!-- App Store -->
  <div class="desktop-icon" ondblclick="openApp('appstore')" title="App Store">
    <div class="icon-img">🛒</div>
    <div class="icon-label">App Store</div>
  </div>

  <!-- Settings -->
  <div class="desktop-icon" ondblclick="openApp('settings')" title="System Settings">
    <div class="icon-img">⚙️</div>
    <div class="icon-label">Settings</div>
  </div>

  <!-- Calculator -->
  <div class="desktop-icon" ondblclick="openApp('calculator')" title="Calculator">
    <div class="icon-img">🔢</div>
    <div class="icon-label">Calculator</div>
  </div>

  <!-- TextEdit -->
  <div class="desktop-icon" ondblclick="openApp('editor')" title="Text Editor">
    <div class="icon-img">📝</div>
    <div class="icon-label">TextEdit</div>
  </div>

  <!-- System Monitor -->
  <div class="desktop-icon" ondblclick="openApp('sysmon')" title="Activity Monitor">
    <div class="icon-img">📊</div>
    <div class="icon-label">Activity Monitor</div>
  </div>

</div>

<!-- WINDOWS CONTAINER -->
<div id="windows-container" style="position:fixed;top:28px;left:0;right:0;bottom:72px;pointer-events:none;">
</div>

<!-- DOCK -->
<div class="dock-wrap">
  <div class="dock">

    <div class="dock-item" ondblclick="openApp('finder')">
      <div class="dock-icon">📁</div>
      <span class="dock-label">Files</span>
    </div>

    <div class="dock-item" ondblclick="openApp('terminal')">
      <div class="dock-icon">⬛</div>
      <span class="dock-label">Terminal</span>
      <div class="dock-dot"></div>
    </div>

    <div class="dock-item" ondblclick="openApp('appstore')">
      <div class="dock-icon">🛒</div>
      <span class="dock-label">App Store</span>

<script>
/* ================================================
   FoxOS Web Desktop Simulation
   Matches FoxOS v0.1 (build 2026.04.13)
   ================================================ */

let zIndex = 100;
let activeWindow = null;
let dragState = null;
let winCounter = 0;
let dockVisible = true;

const WIN_WIDTH = 720;
const WIN_HEIGHT = 480;

function newWinId() { return 'win-' + (++winCounter); }

function bringToFront(el) {
  zIndex++;
  el.style.zIndex = zIndex;
  activeWindow = el;
}

/* ---- Window Creation ---- */
function createWindow({id, title, icon, width, height, minWidth, minHeight, content}) {
  const wid = id || newWinId();
  if (document.getElementById(wid)) {
    bringToFront(document.getElementById(wid));
    return;
  }
  const w = width || WIN_WIDTH;
  const h = height || WIN_HEIGHT;
  const l = Math.max(40, (window.innerWidth - w) / 2 + Math.random() * 80 - 40);
  const t = Math.max(40, (window.innerHeight - 28 - 72 - h) / 2 + Math.random() * 60 - 30);

  const el = document.createElement('div');
  el.className = 'window';
  el.id = wid;
  el.style.cssText = `left:${l}px; top:${t}px; width:${w}px; height:${h}px; z-index:${zIndex++}`;
  if (minWidth) el.style.minWidth = minWidth + 'px';
  if (minHeight) el.style.minHeight = minHeight + 'px';

  el.innerHTML = `
    <div class="win-titlebar">
      <div class="win-controls" onmousedown="event.stopPropagation()">
        <div class="win-btn close" onclick="closeWindow('${wid}')"></div>
        <div class="win-btn minimize" onclick="minimizeWindow('${wid}')"></div>
        <div class="win-btn maximize" onclick="maximizeWindow('${wid}')"></div>
      </div>
      <div class="win-title">${icon} ${title}</div>
    </div>
    <div class="win-content">${content}</div>
  `;

  document.getElementById('windows-container').appendChild(el);
  setupWindowDrag(el);
  el.addEventListener('mousedown', () => bringToFront(el));
  bringToFront(el);
  return el;
}

function closeWindow(id) {
  const el = document.getElementById(id);
  if (el) { el.remove(); if (activeWindow === el) activeWindow = null; }
}
function minimizeWindow(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}
function maximizeWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.classList.contains('maximized')) {
    el.classList.remove('maximized');
    el.style.top = el.dataset.prevTop || '';
    el.style.left = el.dataset.prevLeft || '';
    el.style.width = el.dataset.prevW || '';
    el.style.height = el.dataset.prevH || '';
  } else {
    el.dataset.prevTop = el.style.top;
    el.dataset.prevLeft = el.style.left;
    el.dataset.prevW = el.style.width;
    el.dataset.prevH = el.style.height;
    el.classList.add('maximized');
  }
}

/* ---- Window Drag ---- */
function setupWindowDrag(el) {
  const tb = el.querySelector('.win-titlebar');
  tb.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-controls') || e.target.classList.contains('win-btn')) return;
    if (el.classList.contains('maximized')) return;
    e.preventDefault();
    dragState = {
      el,
      startX: e.clientX, startY: e.clientY,
      origLeft: parseFloat(el.style.left) || 0,
      origTop: parseFloat(el.style.top) || 0
    };
    bringToFront(el);
  });
}

document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  dragState.el.style.left = (dragState.origLeft + dx) + 'px';
  dragState.el.style.top = (dragState.origTop + dy) + 'px';
});
document.addEventListener('mouseup', () => { dragState = null; });

/* ---- Clock ---- */
function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes().toString().padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  document.getElementById('clock').textContent = `${h12}:${m} ${ampm}`;
}
updateClock();
setInterval(updateClock, 10000);

}

function termKey(e) {
  if (e.key !== 'Enter') return;
  const input = document.getElementById('term-input');
  const out = document.getElementById('term-output');
  const cmd = input.value.trim();
  input.value = '';
  const termLine = document.createElement('div');
  termLine.className = 'terminal-line';
  termLine.innerHTML = `<span class="terminal-prompt">teo@foxos:~$ </span><span class="terminal-cmd">${escHtml(cmd)}</span>`;
  out.appendChild(termLine);
  const result = termExec(cmd);
  if (result) {
    const resEl = document.createElement('div');
    resEl.className = 'terminal-line';
    resEl.innerHTML = `<span class="terminal-out">${escHtml(result)}</span>`;
    out.appendChild(resEl);
  }
  document.getElementById('term-body').scrollTop = document.getElementById('term-body').scrollHeight;
}

function termExec(cmd) {
  const c = cmd.toLowerCase().split(' ')[0];
  switch(c) {
    case 'help': return 'help  clear  neofetch  date  whoami  uname  ls  pwd  echo  cat';
    case 'clear': document.getElementById('term-output').innerHTML = ''; return '';
    case 'whoami': return 'teo';
    case 'date': return new Date().toString();
    case 'pwd': return '/home/teo';
    case 'uname': return 'Linux foxos 6.8.0-51-generic x86_64 GNU/Linux';
    case 'echo': return cmd.slice(5);
    case 'neofetch':
      return `         .:oO${''.padEnd(22,'0')}Oo:.        \n`+
             `       .:dOOOOOO${''.padEnd(14,'0')}d:.      \n`+
             `     .:oO${''.padEnd(22,'0')}Oo:        \n`+
             `   .:dOOOOOO${''.padEnd(14,'0')}d:.          \n`+
             `   :OO${''.padEnd(22,'0')}OO:              \n`+
             `   :OO${''.padEnd(22,'0')}OO:   FoxOS v0.1   \n`+
             `   :OO${''.padEnd(22,'0')}OO:   2026.04.13   \n`+
             `   :OO${''.padEnd(22,'0')}OO:              \n`+
             `   'dOOOOOO${''.padEnd(14,'0')}d:'            \n`+
             `     ':oO${''.padEnd(22,'0')}Oo:'              \n`+
             `       .:dOOOOOOb.          OS: FoxOS v0.1\n`+
             `         '':oO0Oo:''         Host: Custom Build\n`+
             `                          Kernel: 6.8.0-51-generic\n`+
             `                          Shell: bash 5.2.21\n`+
             `                          Resolution: 1920x1080\n`+
             `                          Theme: Greybird-Dark\n`+
             `                          Icons: Papirus-Dark\n`+
             `                          CPU: Intel i5-12400F\n`+
             `                          GPU: NVIDIA RTX 3060\n`+
             `                          Memory: 7.6G / 16G';
    case 'ls': return 'Documents  Downloads  Pictures  Music  Videos';
    case 'cat': return 'This is a simulated filesystem. Check the Files app for real navigation.';
    default: return c ? `bash: ${c}: command not found`;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

let calcNewNum = true;

function openCalculator() {
  const content = `
    <div class="calc-display" id="calc-display">0</div>
    <div class="calc-buttons">
      <button class="calc-btn fn" onclick="calcC()">AC</button>
      <button class="calc-btn fn" onclick="calcSign()">±</button>
      <button class="calc-btn fn" onclick="calcPct()">%</button>
      <button class="calc-btn op" onclick="calcOpClick('/')">÷</button>
      <button class="calc-btn" onclick="calcDigit('7')">7</button>
      <button class="calc-btn" onclick="calcDigit('8')">8</button>
      <button class="calc-btn" onclick="calcDigit('9')">9</button>
      <button class="calc-btn op" onclick="calcOpClick('*')">×</button>
      <button class="calc-btn" onclick="calcDigit('4')">4</button>
      <button class="calc-btn" onclick="calcDigit('5')">5</button>
      <button class="calc-btn" onclick="calcDigit('6')">6</button>
      <button class="calc-btn op" onclick="calcOpClick('-')">−</button>
      <button class="calc-btn" onclick="calcDigit('1')">1</button>
      <button class="calc-btn" onclick="calcDigit('2')">2</button>
      <button class="calc-btn" onclick="calcDigit('3')">3</button>
      <button class="calc-btn op" onclick="calcOpClick('+')">+</button>
      <button class="calc-btn" onclick="calcDigit('0')" style="grid-column:span 2;text-align:left;padding-left:20px;">0</button>
      <button class="calc-btn" onclick="calcDot()">.</button>
      <button class="calc-btn equals" onclick="calcEquals()">=</button>
    </div>`;
  createWindow({id:'calculator', title:'Calculator', icon:'🔢', width:300, height:420, minWidth:260, minHeight:380, content});
}

function calcDigit(d) {
  if (calcNewNum) { calcVal = d; calcNewNum = false; }
  else { if (calcVal === '0' && d !== '.') calcVal = d; else calcVal += d; }
  updateCalc();
}
function calcDot() { if (calcNewNum) { calcVal = '0.'; calcNewNum = false; } else if (!calcVal.includes('.')) calcVal += '.'; updateCalc(); }
function calcC() { calcVal = '0'; calcMem = null; calcOp = null; calcNewNum = true; updateCalc(); }
function calcSign() { calcVal = String(-parseFloat(calcVal)); updateCalc(); }
function calcPct() { calcVal = String(parseFloat(calcVal) / 100); updateCalc(); }
function calcOpClick(op) { if (calcOp && !calcNewNum) calcEquals(); calcMem = parseFloat(calcVal); calcOp = op; calcNewNum = true; }
function calcEquals() { if (!calcOp || calcMem === null) return; let r; switch(calcOp) { case '+': r = calcMem + parseFloat(calcVal); break; case '-': r = calcMem - parseFloat(calcVal); break; case '*': r = calcMem * parseFloat(calcVal); break; case '/': r = calcVal === '0' ? 'Error' : calcMem / parseFloat(calcVal); break; } calcVal = String(r); calcOp = null; calcMem = null; calcNewNum = true; updateCalc(); }
function updateCalc() { const d = document.getElementById('calc-display'); if (d) d.textContent = calcVal.length > 12 ? parseFloat(calcVal).toExponential(6) : calcVal; }

const SM_PROCS = [
  ['1','systemd','0.1','0.4'],['245','gnome-shell','2.3','1.8'],['1234','firefox','5.1','3.2'],
  ['567','Xorg','1.8','0.9'],['890','pulseaudio','0.3','0.2'],['1023','gnome-terminal','0.8','0.5'],
  ['1100','nautilus','0.4','0.6'],['1200','wine','12.4','8.7'],['1345','code','3.2','2.1'],
  ['1456','steam','8.7','6.4'],['1567','discord','2.1','1.5'],['1678','spotify','1.3','0.9'],
];
const SM_NAMES = ['systemd','gnome-shell','firefox','Xorg','pulseaudio','gnome-terminal','nautilus','wine','code','steam','discord','spotify','dconf','gvfsd','dbus-daemon','NetworkManager','cups','bluetoothd'];
const SM_PIDS = [1,245,567,890,1023,1100,1200,1345,1456,1567,1678,1789,1890,2001,2112,2223,2334,2445,2556];

function updateSysmon() {
  const el = document.getElementById('sm-cpu');
  if (!el) { clearInterval(window._smInterval); return; }
  const cpu = (Math.random() * 25 + 8).toFixed(1);
  const memUsed = (Math.random() * 3 + 2).toFixed(1);
  const memTotal = 16;
  const diskUsed = (Math.random() * 200 + 100).toFixed(0);
  const diskTotal = 512;
  el.textContent = cpu + '%';
  document.getElementById('sm-cpu-bar').style.width = cpu + '%';
  document.getElementById('sm-mem').textContent = memUsed + ' GB';
  document.getElementById('sm-mem-used').textContent = memUsed + ' / ' + memTotal + ' GB';
  document.getElementById('sm-mem-bar').style.width = (memUsed / memTotal * 100) + '%';
  document.getElementById('sm-disk').textContent = diskUsed + ' GB';
  document.getElementById('sm-disk-used').textContent = diskUsed + ' / ' + diskTotal + ' GB';
  document.getElementById('sm-disk-bar').style.width = (diskUsed / diskTotal * 100) + '%';

  // Randomize process data
  const procs = document.getElementById('sm-procs');
  if (!procs) return;
  let html = `<div class="proc-row" style="font-weight:600;color:var(--text-dim);font-size:11px;">
    <span>PID</span><span>Name</span><span style="text-align:right;">CPU%</span><span style="text-align:right;">MEM%</span>
  </div>`;
  for (let i = 0; i < 12; i++) {
    const pid = SM_PIDS[i];
    const name = SM_NAMES[i];
    const cpuP = (Math.random() * 15).toFixed(1);
    const memP = (Math.random() * 8).toFixed(1);
    html += `<div class="proc-row">
      <span class="proc-pid">${pid}</span>
      <span class="proc-name">${name}</span>
      <span class="proc-cpu">${cpuP}%</span>
      <span class="proc-mem">${memP}%</span>
    </div>`;
  }
  procs.innerHTML = html;
}

/* ==================== BOOT SEQUENCE (auto on first load) ==================== */
(function bootSeq() {
  // Show welcome on first launch
  setTimeout(() => {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:99999;display:flex;align-items:center;justify-content:center;';
    el.id = 'boot-screen';
    el.innerHTML = `
      <div style="text-align:center;animation:fadeIn 1s ease;">
        <div style="font-size:80px;margin-bottom:16px;">🍎</div>
        <div style="font-size:28px;font-weight:700;color:#fff;margin-bottom:8px;">FoxOS</div>
        <div style="font-size:16px;color:rgba(255,255,255,0.6);margin-bottom:24px;">Loading your desktop…</div>
        <div style="width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin:0 auto;overflow:hidden;">
          <div id="boot-bar" style="height:100%;background:#2997ff;border-radius:2px;width:0%;transition:width 0.3s;"></div>
        </div>
        <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:12px;" id="boot-status">Initializing…</div>
      </div>
      <style>@keyframes fadeIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}</style>`;
    document.body.appendChild(el);

    const steps = [
      [10,'Loading kernel modules…'],
      [25,'Starting systemd services…'],
      [40,'Mounting filesystems…'],
      [55,'Starting LightDM…'],
      [70,'Loading FoxOS desktop…'],
      [85,'Applying theme…'],
      [100,'Ready!'],
    ];

    let si = 0;
    function nextStep() {
      if (si >= steps.length) {
        setTimeout(() => {
          const bs = document.getElementById('boot-screen');
          if (bs) bs.style.opacity = '0';
          setTimeout(() => { if (document.getElementById('boot-screen')) document.getElementById('boot-screen').remove(); }, 400);
          // Show notification
          setTimeout(() => showNotif('Welcome to FoxOS! 🍎', 'Your FoxOS desktop is ready. v0.1 — build 2026.04.13'), 300);
        }, 400);
        return;
      }
      const [pct, msg] = steps[si++];
      document.getElementById('boot-bar').style.width = pct + '%';
      document.getElementById('boot-status').textContent = msg;
      setTimeout(nextStep, 350 + Math.random() * 200);
    }
    setTimeout(nextStep, 500);
  }, 800);
})();

function showNotif(title, body) {
  const notif = document.getElementById('notif');
  document.getElementById('notifTitle').textContent = title;
  document.getElementById('notifBody').textContent = body;
  notif.classList.add('show');
  setTimeout(() => notif.classList.remove('show'), 5000);
}
